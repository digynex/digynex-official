<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative Authority - Global Elite V12.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --cv-primary: {{#if primaryColor}}{{primaryColor}}{{else}}#8b5cf6{{/if}};
            --cv-secondary: #f43f5e;
            --cv-bg: #fff;
        }

        @page { margin: 0; size: A4; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            -webkit-print-color-adjust: exact; 
            background: var(--cv-bg); 
            color: #1e293b;
            margin: 0; padding: 0;
        }

        .page { 
            width: 210mm; 
            min-height: 297mm; 
            margin: 0 auto; 
            display: flex; 
            position: relative; 
            overflow: hidden;
            background: white;
        }

        /* ASYMMETRIC ACCENT BAR */
        .accent-bar {
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 15mm;
            background: linear-gradient(to bottom, var(--cv-primary), var(--cv-secondary));
            opacity: 0.15;
            z-index: 0;
        }

        .main-content { 
            flex: 1; 
            padding: 20mm 20mm 20mm 35mm;
            position: relative;
            z-index: 1;
        }

        .serif { font-family: 'Playfair Display', serif; }

        h1 { font-family: 'Playfair Display', serif; font-size: 42px; font-weight: 900; color: var(--cv-primary); line-height: 0.9; margin-bottom: 8px; }
        .headline { font-size: 14px; font-weight: 800; color: #64748b; text-transform: uppercase; letter-spacing: 0.25em; margin-bottom: 25px; }

        .contact-grid {
            display: grid;
            grid-template-cols: repeat(2, 1fr);
            gap: 10px;
            font-size: 9px;
            font-weight: 700;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 40px;
        }

        h2.section-title {
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            font-weight: 900;
            color: var(--cv-primary);
            margin: 35px 0 15px 0;
            position: relative;
        }
        h2.section-title::before {
            content: "";
            position: absolute;
            left: -15px; top: 50%;
            width: 8px; height: 8px;
            background: var(--cv-secondary);
            border-radius: 50%;
            transform: translateY(-50%);
        }

        .job-card {
            border-left: 2px solid #f1f5f9;
            padding-left: 20px;
            margin-bottom: 25px;
        }
        .job-title { font-size: 14px; font-weight: 800; color: #0f172a; }
        .company-meta { font-size: 10px; font-weight: 700; color: var(--cv-secondary); margin-bottom: 8px; text-transform: uppercase; }
        
        .bullet-list li { 
            position: relative; 
            padding-left: 0; 
            font-size: 10.5px; 
            line-height: 1.6; 
            color: #475569; 
            margin-bottom: 6px; 
            text-align: justify;
        }

        /* STEALTH DIVIDER */
        .stealth-divider-container { position: relative; margin: 30px 0; height: 1px; }
        .stealth-keywords { color: var(--cv-secondary); font-size: 0.1pt; letter-spacing: -0.5px; opacity: 1; position: absolute; top: 0; left: 0; user-select: none; pointer-events: none; white-space: nowrap; overflow: hidden; width: 100%; }
        .visible-line { border: none; border-top: 3px solid #f8fafc; margin: 0; }

        .skill-pill {
            font-size: 9px;
            font-weight: 900;
            color: white;
            background: var(--cv-primary);
            padding: 5px 15px;
            border-radius: 100px;
            margin-right: 8px;
            margin-bottom: 8px;
            display: inline-block;
            text-transform: uppercase;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="accent-bar"></div>
        <main class="main-content">
            <header>
                <h1>{{name}}</h1>
                <p class="headline">{{headline}}</p>
                <div class="contact-grid">
                    <span>{{location}}</span>
                    <span>{{email}}</span>
                    <span>{{phone}}</span>
                </div>
            </header>

            {{#if bio}}
            <section>
                <p class="text-[12px] leading-relaxed text-slate-600 font-medium italic border-r-4 border-slate-50 pr-8 text-right">{{bio}}</p>
            </section>
            {{/if}}

            <div class="stealth-divider-container">
                <div class="stealth-keywords">{{stealthKeywords}}</div>
                <hr class="visible-line">
            </div>

            <section>
                <h2 class="section-title">Narrative Experience</h2>
                {{{experienceHTML}}}
            </section>

            <section>
                <h2 class="section-title">Creative Signature</h2>
                <div class="flex flex-wrap">
                    {{#each skills}}<span class="skill-pill">{{this}}</span>{{/each}}
                </div>
            </section>

            <footer class="mt-20 pt-10 border-t border-slate-100 flex justify-between items-center opacity-30">
                <span class="text-[8px] font-black uppercase tracking-[0.5em] serif">Creative Authority Engine</span>
                <span class="text-[8px] font-black uppercase tracking-[0.2em]">{{referenceId}}</span>
            </footer>
        </main>
    </div>
</body>
</html>
